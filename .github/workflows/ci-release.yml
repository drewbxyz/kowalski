name: CI & Release

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate JSON files
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json hooks/hooks.json; do
            python3 -m json.tool "$f" > /dev/null || { echo "Invalid JSON: $f"; exit 1; }
          done

      - name: Shared blocks must be in sync with shared/*.md
        run: |
          for f in skills/*/SKILL.md agents/*.md; do
            grep -q '<!-- Vault Context:' "$f" || { echo "Missing '<!-- Vault Context' start marker in $f"; exit 1; }
          done
          for f in skills/wiki-ingest/SKILL.md agents/ingest-worker.md; do
            grep -q '<!-- Summary Page Spec:' "$f" || { echo "Missing '<!-- Summary Page Spec' start marker in $f"; exit 1; }
          done
          scripts/sync-shared-blocks.sh
          if ! git diff --exit-code -- skills agents; then
            echo ""
            echo "Shared blocks are out of sync with their canonical sources."
            echo "Edit shared/vault-context.md or shared/summary-page-spec.md (never the copies"
            echo "in skills/ or agents/), run scripts/sync-shared-blocks.sh, and commit the result."
            exit 1
          fi

      - name: Plugin changes must bump the version
        run: |
          latest=$(git tag -l 'v*' --sort=-v:refname | head -1)
          [ -z "$latest" ] && { echo "No tags yet — skipping"; exit 0; }
          version=$(python3 -c 'import json; print(json.load(open(".claude-plugin/plugin.json"))["version"])')
          if [ "v$version" = "$latest" ] && ! git diff --quiet "$latest" HEAD -- skills agents hooks .claude-plugin; then
            echo "Plugin content changed since $latest but plugin.json version is still $version — bump it."
            git diff --stat "$latest" HEAD -- skills agents hooks .claude-plugin
            exit 1
          fi

  release:
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag and release new version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(python3 -c 'import json; print(json.load(open(".claude-plugin/plugin.json"))["version"])')
          if git rev-parse "v$version" > /dev/null 2>&1; then
            echo "v$version already tagged — nothing to release"
            exit 0
          fi
          gh release create "v$version" --title "v$version" --generate-notes
